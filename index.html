<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>HAMYAZ AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0d0d0d; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #chat { width: 100%; max-width: 500px; height: 100%; background: #1a1a1a; display: flex; flex-direction: column; }
        #header { background: linear-gradient(90deg, #ff0000, #990000); color: white; text-align: center; padding: 10px; font-weight: bold; }
        #top { background: #111; color: #00ffcc; text-align: center; padding: 6px; font-size: 13px; }
        #warning { background: #ff0000; color: white; text-align: center; padding: 6px; font-size: 13px; font-weight: bold; }
        #box { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 10px 14px; border-radius: 12px; max-width: 80%; word-wrap: break-word; position: relative; }
        .user { background: #004d40; color: white; align-self: flex-end; }
        .bot { background: #333; color: #00ffcc; align-self: flex-start; }
        
        /* Düşünüyor animasyonu */
        .typing { font-style: italic; font-size: 12px; color: #aaa; background: none; }

        #inputArea { display: flex; padding: 10px; background: #111; }
        input { flex: 1; padding: 10px; border: none; border-radius: 20px; background: #1e1e1e; color: white; outline: none; }
        button { background: #ff0000; color: white; border: none; padding: 10px; margin-left: 6px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        #learn { background: #222; padding: 10px; display: flex; flex-direction: column; gap: 6px; }
        .small { padding: 8px; border-radius: 10px; border: none; background: #111; color: white; }
        .learnBtn { background: #ff0000; color: white; border: none; padding: 8px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div id="chat">
    <div id="header">🇹🇷 HAMYAZ AI</div>
    <div id="top">⚡ Sezan.site’den daha akıllı AI</div>
    <div id="warning">⚠️ Sadece bu cihazda öğrenir öğrettikleriniz</div>
    <div id="box"></div>
    <div id="learn">
        <input id="k" class="small" placeholder="Şunu diyince">
        <input id="v" class="small" placeholder="Şunu desin">
        <button class="learnBtn" onclick="learn()">ÖĞRET</button>
    </div>
    <div id="inputArea">
        <input id="text" placeholder="Bir şey yaz..." autocomplete="off">
        <button onclick="send()">ONAYLA</button>
    </div>
</div>

<script>
const KEY = "hamyaz_db_v3";
let lastInput = ""; 

const defaultDB = {
    "selam":"aleykümselam 🇹🇷",
    "sa":"as kardeşim 😄",
    "naber":"iyiyim sen?",
    "nasılsın":"iyiyim 😄 sen nasılsın?",
    "kimsin":"ben HAMYAZ AI 🤖",
    "elhamdülillah":"Allah kabul etsin kardeşim 🙏",
    "müslüman mısın":"Elhamdülillah 👍"
};

function loadDB(){
    try {
        let saved = JSON.parse(localStorage.getItem(KEY)) || {};
        return {...defaultDB, ...saved};
    } catch(e) { return defaultDB; }
}

let db = loadDB();

function getReply(text){
    text = String(text).toLowerCase().trim();
    
    // Esnek Anlama (Slm, mrb gibi kısaltmalar için)
    text = text.replace(/slm/g, "selam").replace(/mrb/g, "merhaba");

    for(let key in db){
        // Kullanıcı "selammm" yazsa da "selam" anahtarını yakalar
        if(text.includes(key) || key.includes(text)){
            return String(db[key]);
        }
    }
    const fb = ["bunu bilmiyorum 😄", "anlamadım", "hee", "ilginç 🤔", "devam et"];
    return fb[Math.floor(Math.random()*fb.length)];
}

function send(){
    let input = document.getElementById("text");
    let val = input.value.trim();
    if(!val) return;

    // Google Arama Kontrolü
    if(val.toLowerCase() === lastInput.toLowerCase()){
        add("Aynı şeyi yazdın, Google'da arıyorum... 🚀", "bot");
        setTimeout(() => {
            window.open(`https://www.google.com/search?q=${encodeURIComponent(val)}`, '_blank');
        }, 1000);
        lastInput = ""; 
        input.value = "";
        return;
    }
    lastInput = val; 

    add(val, "user");
    input.value = "";

    // --- Düşünme Efekti Başlangıç ---
    let typingDiv = add("HAMYAZ AI yazıyor...", "bot typing");
    
    setTimeout(() => {
        typingDiv.remove(); // "Yazıyor..." yazısını kaldır
        add(getReply(val), "bot"); // Gerçek cevabı ekle
    }, 2000); // tam 2 saniye bekler
    // --- Düşünme Efekti Bitiş ---
}

function learn(){
    let k = document.getElementById("k").value.trim().toLowerCase();
    let v = document.getElementById("v").value.trim();
    if(!k || !v) return;
    db[k] = String(v);
    localStorage.setItem(KEY, JSON.stringify(db));
    document.getElementById("k").value = "";
    document.getElementById("v").value = "";
    alert("Öğrenildi 👍");
}

function add(text, type){
    let box = document.getElementById("box");
    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = String(text);
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
    return div; // Div'i geri döndürüyoruz ki sonra silebilelim (yazıyor efekti için)
}

document.getElementById("text").addEventListener("keydown", e => {
    if(e.key === "Enter") send();
});
</script>
</body>
</html>
