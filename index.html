<script>

const yasakliKelimeler = ["küfür1","argo1"];

const girisMesajlari = [
"🇹🇷 Selam! Sana şaka yapayım mı? 😏"
];

let lastMessage = "";
let repeatCount = 0;
let jokeStage = 0;
let isTyping = false;

const zekiCevaplar = [
{ anahtar:["selam","merhaba","sa"], cevap:[
"Selam 😎",
"Aleykümselam 🇹🇷",
"Hoş geldin 👑"
]},
{ anahtar:["nasılsın"], cevap:[
"Kediler mama içer gibi iyiyim 😄",
"CPU biraz yanıyor ama idare 🔥",
"Ben iyiyim sen nasılsın?"
]},
{ anahtar:["ne yapıyorsun"], cevap:[
"Evreni gözlemliyorum 🌍",
"Boş yapıyorum 😏"
]}
];

window.onload = () => {
addMessage(girisMesajlari[0],"ai-message");
};

function sendMessage(){

if(isTyping) return;

const input=document.getElementById("user-input");
const msg=input.value.trim();
if(!msg) return;

const msgLower=msg.toLowerCase();

addMessage(msg,"user-message");
input.value="";

// 🔁 aynı mesaj kontrolü
if(msgLower === lastMessage){
repeatCount++;
} else {
repeatCount = 0;
}
lastMessage = msgLower;

isTyping=true;

fakeTyping(()=>{

let reply="";
let searchMode=false;

// 🔁 2 kere aynı şey yazarsa
if(repeatCount >= 1){
reply="Bunu zaten söyledin 😏 Google’dan aratalım mı?";
searchMode=true;
}

// 😂 şaka sistemi
else if(msgLower.includes("yap") || msgLower.includes("evet")){
if(jokeStage === 0){
reply="3 adam sırayla uçaktan atlamış ✈️😂 uçak paramparça olmuş 🤣🤣";
jokeStage = 1;
}
else{
reply="Adamın biri gülmüş 😄 alıp bahçeye dikmişler 🌱😂";
jokeStage = 0;
}
}

// 🧠 yasaklı
else if(yasakliKelimeler.some(k=>msgLower.includes(k))){
reply="🇹🇷 Sakin ol 😅";
}

// 🤖 normal cevaplar
else{
let found = zekiCevaplar.find(item =>
item.anahtar.some(k=>msgLower.includes(k))
);

if(found){
reply = found.cevap[Math.floor(Math.random()*found.cevap.length)];
}
else{
const fallback = [
"Kediler bilgisayar kullanmayı öğreniyor 🐱💻",
"Uzayda WiFi çekmiyor galiba 🚀",
"Bunu anlamadım ama komik duruyor 😄"
];

reply = fallback[Math.floor(Math.random()*fallback.length)];
}
}

addMessage(reply,"ai-message",searchMode,msg);

isTyping=false;
});
}

function fakeTyping(cb){
addMessage("Yazıyor...","ai-message typing");

setTimeout(()=>{
const t=document.querySelector(".typing");
if(t) t.remove();
cb();
},700+Math.random()*700);
}

function addMessage(text,className,showGoogle=false,query=""){
const win=document.getElementById("chat-window");

const div=document.createElement("div");
div.className="message "+className;
div.innerHTML=text;

if(showGoogle){
const a=document.createElement("a");
a.className="google-btn";
a.textContent="🔍 Google'da Ara";
a.href="https://www.google.com/search?q="+encodeURIComponent(query);
a.target="_blank";
div.appendChild(a);
}

win.appendChild(div);
win.scrollTop=win.scrollHeight;
}

document.getElementById("user-input")
.addEventListener("keypress",e=>{
if(e.key==="Enter") sendMessage();
});

</script>
