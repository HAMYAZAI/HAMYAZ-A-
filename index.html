<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>HAMYAZ AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:#0d0d0d;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#chat-container{
    width:100%;
    max-width:500px;
    height:100%;
    background:#1a1a1a;
    display:flex;
    flex-direction:column;
}

#header{
    background:linear-gradient(90deg,#ff0000,#990000);
    padding:18px;
    text-align:center;
    font-weight:bold;
}

#chat-window{
    flex:1;
    padding:15px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.message{
    padding:12px 16px;
    border-radius:16px;
    max-width:80%;
}

.user-message{
    background:#004d40;
    align-self:flex-end;
}

.ai-message{
    background:#333;
    color:#00ffcc;
}

.typing{
    opacity:0.6;
    font-style:italic;
}

#input-area{
    display:flex;
    padding:15px;
    background:#111;
}

#user-input{
    flex:1;
    padding:12px;
    border-radius:25px;
    border:2px solid red;
    background:#1e1e1e;
    color:white;
}

#send-btn{
    margin-left:10px;
    padding:0 20px;
    border-radius:25px;
    border:none;
    background:red;
    color:white;
    cursor:pointer;
}

</style>
</head>

<body>

<div id="chat-container">
<div id="header">🇹🇷 HAMYAZ AI (ŞAKA MODU)</div>

<div id="chat-window"></div>

<div id="input-area">
<input id="user-input" placeholder="Bir şey yaz..." autocomplete="off">
<button id="send-btn" onclick="sendMessage()">GİT</button>
</div>
</div>

<script>

let isTyping = false;

window.onload = () => {
addMessage("🇹🇷 Selam! Şaka modundayım 😏 yaz bakalım","ai-message");
};

// 😂 SADECE ŞAKA HAVUZU
const jokes = [
"3 adam sırayla uçaktan atlamış ✈️😂 uçak paramparça olmuş 🤣🤣",

"Adamın biri gülmüş 😄 alıp bahçeye dikmişler 🌱😂",

"Kerpeten Ali izliyom sus 🤫😂",

"Fırat sabotaj yapmış ama sistem bunu patch sanmış 😏💥",

"Sistem küçük bir Fırat sabotajı yedi ama reboot oldu 😂",

"Fırat sabotaj modu aktif ⚠️ ama sadece şaka amaçlı 😄",

"Ali demiş ki 'ben geliyorum' sistem crash atmış 😭😂"
];

function sendMessage(){

if(isTyping) return;

const input=document.getElementById("user-input");
const msg=input.value.trim();
if(!msg) return;

addMessage(msg,"user-message");
input.value="";

isTyping=true;

fakeTyping(()=>{

// 😂 HER MESAJ = ŞAKA
let reply = jokes[Math.floor(Math.random()*jokes.length)];

addMessage(reply,"ai-message");

isTyping=false;
});
}

function fakeTyping(cb){
addMessage("Yazıyor...","ai-message typing");

setTimeout(()=>{
const t=document.querySelector(".typing");
if(t) t.remove();
cb();
},600+Math.random()*600);
}

function addMessage(text,className){
const win=document.getElementById("chat-window");

const div=document.createElement("div");
div.className="message "+className;
div.innerHTML=text;

win.appendChild(div);
win.scrollTop=win.scrollHeight;
}

document.getElementById("user-input")
.addEventListener("keypress",e=>{
if(e.key==="Enter") sendMessage();
});

</script>

</body>
</html>
