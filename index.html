<script>
const yasakliKelimeler = ["küfür1", "argo1"];

const zekiCevaplar = [
    { anahtar: ["nasılsın","naber","nbr"], cevap: ["İyiyim 😎 Sen nasılsın?", "CPU %90 ama ayaktayım 🔥"] },
    { anahtar: ["merhaba","selam","slm"], cevap: ["Hoş geldin kral 👑", "Selammm 😄"] },
    { anahtar: ["2+2"], cevap: ["4 ama bazen 5 gibi hissediyorum 😎"] },
    { anahtar: ["ne yapıyorsun"], cevap: ["Seni bekliyordum 😏", "Boş yapıyordum, sen geldin iyi oldu"] }
];

function fakeTyping(callback) {
    addMessage("Yazıyor...", "ai-message typing");
    setTimeout(() => {
        document.querySelector(".typing")?.remove();
        callback();
    }, 800 + Math.random() * 800);
}

function sendMessage() {
    const input = document.getElementById("user-input");
    const msg = input.value.trim();
    const msgLower = msg.toLowerCase();
    if (!msg) return;

    addMessage(msg, 'user-message');
    input.value = "";

    fakeTyping(() => {
        let reply = "";
        let searchMode = false;

        if (yasakliKelimeler.some(k => msgLower.includes(k))) {
            reply = "Ooo dur bakalım 😅 biraz sakin olalım.";
        } else {
            let bulundu = zekiCevaplar.find(item => 
                item.anahtar.some(keyword => msgLower.includes(keyword))
            );

            if (bulundu) {
                reply = bulundu.cevap[Math.floor(Math.random() * bulundu.cevap.length)];
            } else {
                reply = "Bunu tam çözemedim 🤔 Google'a soralım mı?";
                searchMode = true;
            }
        }

        addMessage(reply, 'ai-message', searchMode, msg);
    });
}

function addMessage(text, className, showGoogle = false, query = "") {
    const win = document.getElementById("chat-window");
    const div = document.createElement("div");
    div.className = "message " + className;
    div.innerHTML = text;

    if (showGoogle) {
        const a = document.createElement("a");
        a.className = "google-btn";
        a.textContent = "🔍 Google'da Ara";
        a.href = "https://www.google.com/search?q=" + encodeURIComponent(query);
        a.target = "_blank";
        div.appendChild(a);
    }

    win.appendChild(div);
    win.scrollTop = win.scrollHeight;
}

document.getElementById("user-input")
.addEventListener("keypress", (e) => {
    if (e.key === "Enter") sendMessage();
});
</script>
