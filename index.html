<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>HAMYAZ AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0d0d0d; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #chat { width: 100%; max-width: 500px; height: 100%; background: #1a1a1a; display: flex; flex-direction: column; }
        #header { background: linear-gradient(90deg, #ff0000, #990000); color: white; text-align: center; padding: 10px; font-weight: bold; }
        #top { background: #111; color: #00ffcc; text-align: center; padding: 6px; font-size: 13px; }
        #warning { background: #ff0000; color: white; text-align: center; padding: 6px; font-size: 13px; font-weight: bold; }
        #box { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .msg { display: flex; align-items: flex-start; max-width: 85%; word-wrap: break-word; }
        .user { align-self: flex-end; flex-direction: row-reverse; }
        .bot { align-self: flex-start; }
        .text { padding: 10px 14px; border-radius: 12px; font-size: 14px; }
        .user .text { background: #004d40; color: white; }
        .bot .text { background: #333; color: #00ffcc; }
        .icon { width: 30px; height: 30px; border-radius: 50%; font-size: 18px; display: flex; justify-content: center; align-items: center; }
        .user .icon { margin-left: 8px; background: #fff; color: #333; }
        .bot .icon { margin-right: 8px; background: #900; color: #fff; }
        .typing { font-style: italic; color: #777 !important; background: transparent !important; }
        #inputArea { display: flex; padding: 10px; background: #111; }
        input { flex: 1; padding: 10px; border: none; border-radius: 20px; background: #1e1e1e; color: white; outline: none; font-size: 14px; }
        button { background: #ff0000; color: white; border: none; padding: 10px; margin-left: 6px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 14px; }
        #learn { background: #222; padding: 10px; display: flex; flex-direction: column; gap: 6px; }
        .small { padding: 8px; border-radius: 10px; border: none; background: #111; color: white; }
        .learnBtn { background: #ff0000; color: white; border: none; padding: 8px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div id="chat">
    <div id="header">🇹🇷 HAMYAZ AI</div>
    <div id="top">⚡ Sezan.site’den daha akıllı AI</div>
    <div id="warning">⚠️ Sadece bu cihazda öğrenir öğrettikleriniz</div>
    <div id="box"></div>
    <div id="learn">
        <input id="k" class="small" placeholder="Şunu diyince">
        <input id="v" class="small" placeholder="Şunu desin">
        <button class="learnBtn" onclick="learn()">ÖĞRET</button>
    </div>
    <div id="inputArea">
        <input id="text" placeholder="Bir şey yaz..." autocomplete="off">
        <button onclick="send()">ONAYLA</button>
    </div>
</div>

<script>
const KEY = "hamyaz_db_v4";
let lastInput = ""; 

const rastgeleBilgiler = [
    "Ada Lovelace, 1843'te dünyanın ilk programcısı olmuştur.",
    "Python ismi meşhur komedi grubu Monty Python'dan gelir.",
    "İlk bilgisayar faresi ahşaptan yapılmıştır.",
    "Bilgisayardaki 'bug' terimi gerçek bir böcekten (güve) gelir."
];

// --- GENİŞLETİLMİŞ ÖĞRENMİŞ DB ---
const defaultDB = {
    "selam": "aleykümselam kardeşim 🇹🇷",
    "sa": "as, naber? 😄",
    "as": "naber aga?",
    "naber": "iyidir, senden naber?",
    "nasılsın": "çok iyiyim, sen nasılsın? 😄",
    "iyiyim": "hep iyi ol inşallah 👍",
    "kötüyüm": "hayırdır inşallah, niye kötü hissediyorsun? 😔",
    "napıyon": "seninle konuşuyorum, kodlarımı geliştiriyorum 😎",
    "ne yapıyorsun": "boş yapıyorum desem inanma, sistemi geliştiriyorum!",
    "kimsin": "Ben HAMYAZ AI, senin kişisel asistanınım 🤖",
    "yaşın kaç": "Yaşım yok ama kodlarım taze!",
    "nerelisin": "Bağcılar çocuğuyuz, semt bizim ev kira! 😂",
    "müslüman mısın": "Elhamdülillah 👍",
    "bye": "görüşürüz kardeşim, kendine iyi bak 👋",
    "eyvallah": "ne demek her zaman 🤝"
};

let db = JSON.parse(localStorage.getItem(KEY)) || defaultDB;

function getReply(text){
    let t = text.toLowerCase().trim();
    
    // Akıllı Temizlik (napıyonnn, slm, slmmm vb. hepsini standart yapar)
    t = t.replace(/slm/g, "selam").replace(/mrb/g, "merhaba");
    t = t.replace(/napıyon/g, "napıyon").replace(/napion/g, "napıyon").replace(/napıosun/g, "napıyon");
    t = t.replace(/nassın/g, "nasılsın").replace(/nasilsin/g, "nasılsın");

    if(t.includes("bilgi ver") || t.includes("rastgele bilgi")) {
        return rastgeleBilgiler[Math.floor(Math.random() * rastgeleBilgiler.length)];
    }

    for(let key in db){
        // Kullanıcı "selammmm" yazsa da "selam" anahtarını yakalar
        if(t.includes(key) || key.includes(t)){
            return db[key];
        }
    }
    const fb = ["bunu henüz öğrenmedim 😄", "anlamadım ne dediğini?", "ilginçmiş...", "biraz daha anlat", "hee, anlıyorum"];
    return fb[Math.floor(Math.random()*fb.length)];
}

function send(){
    let input = document.getElementById("text");
    let val = input.value.trim();
    if(!val) return;

    if(val.toLowerCase() === lastInput.toLowerCase()){
        add("Aynı şeyi yazınca Google'a gönderiyorum... 🚀", "bot");
        setTimeout(() => {
            window.open(`https://www.google.com/search?q=${encodeURIComponent(val)}`, '_blank');
        }, 1000);
        lastInput = "";
        input.value = "";
        return;
    }
    lastInput = val;

    add(val, "user");
    input.value = "";

    let typingDiv = add("...", "bot typing");
    
    setTimeout(() => {
        typingDiv.remove();
        add(getReply(val), "bot");
    }, 2000); 
}

function learn(){
    let k = document.getElementById("k").value.trim().toLowerCase();
    let v = document.getElementById("v").value.trim();
    if(!k || !v) return;
    db[k] = v;
    localStorage.setItem(KEY, JSON.stringify(db));
    document.getElementById("k").value = "";
    document.getElementById("v").value = "";
    alert("Öğrenildi 👍");
}

function add(text, type){
    let box = document.getElementById("box");
    let div = document.createElement("div");
    div.className = "msg " + type;

    let icon = document.createElement("div");
    icon.className = "icon";
    icon.innerText = type.includes("user") ? "🧑" : "🤖";
    
    let textDiv = document.createElement("div");
    textDiv.className = "text";
    textDiv.innerText = text;

    div.appendChild(icon);
    div.appendChild(textDiv);
    
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
    return div; 
}

document.getElementById("text").addEventListener("keydown", e => {
    if(e.key === "Enter") send();
});
</script>
</body>
</html>
