<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>HAMYAZ AI - Öğrenen Bot</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0d0d0d;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#chat{
width:100%;
max-width:500px;
height:100%;
background:#1a1a1a;
display:flex;
flex-direction:column;
}

#header{
background:linear-gradient(90deg,#ff0000,#990000);
color:white;
text-align:center;
padding:12px;
font-weight:bold;
}

#box{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:8px;
}

.msg{
padding:10px 14px;
border-radius:12px;
max-width:80%;
word-wrap:break-word;
}

.user{
background:#004d40;
color:white;
align-self:flex-end;
}

.bot{
background:#333;
color:#00ffcc;
align-self:flex-start;
}

#inputArea{
display:flex;
padding:10px;
background:#111;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:20px;
outline:none;
background:#1e1e1e;
color:white;
}

button{
background:#ff0000;
color:white;
border:none;
padding:10px 12px;
margin-left:6px;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}

/* öğrenme paneli */
#learnPanel{
background:#222;
padding:10px;
display:flex;
flex-direction:column;
gap:6px;
}

.smallInput{
padding:8px;
border-radius:10px;
border:none;
outline:none;
background:#111;
color:white;
}

.learnBtn{
background:#ffd400;
color:black;
padding:8px;
border-radius:10px;
border:none;
cursor:pointer;
font-weight:bold;
}
</style>
</head>

<body>

<div id="chat">

<div id="header">🇹🇷 HAMYAZ AI - Öğrenen Sistem</div>

<div id="box"></div>

<!-- 🧠 ÖĞRETME PANELİ -->
<div id="learnPanel">
<input id="key" class="smallInput" placeholder="Şunu diyince (örnek: selam)">
<input id="value" class="smallInput" placeholder="Şunu desin (örnek: merhaba 😄)">
<button class="learnBtn" onclick="learn()">ÖĞRET</button>
</div>

<div id="inputArea">
<input id="text" placeholder="Bir şey yaz...">
<button onclick="send()">GİT</button>
</div>

</div>

<script>

// 🧠 DEFAULT BİLGİLER
let db = JSON.parse(localStorage.getItem("hamyaz_db") || "[]");

// 🧠 BOT CEVAP
function getReply(text){

text = text.toLowerCase();

// öğrendiği şeyler
for(let item of db){
if(text.includes(item.key)){
return item.value;
}
}

// fallback
const fb = [
"anlamadım 😄",
"bunu bilmiyorum",
"tekrar söyler misin?",
"ilginç 🤔"
];

return fb[Math.floor(Math.random()*fb.length)];
}

// 💬 MESAJ GÖNDER
function send(){

let input=document.getElementById("text");
let val=input.value.trim();
if(!val) return;

add(val,"user");

setTimeout(()=>{
add(getReply(val),"bot");
},400);

input.value="";
}

// 🧠 ÖĞRETME SİSTEMİ
function learn(){

let k=document.getElementById("key").value.trim().toLowerCase();
let v=document.getElementById("value").value.trim();

if(!k || !v) return;

// ❌ aynı kelime varsa tekrar ekleme
let exists = db.find(x=>x.key===k);

if(exists){
alert("Bu kelime zaten öğretilmiş 😄");
return;
}

db.push({key:k,value:v});
localStorage.setItem("hamyaz_db",JSON.stringify(db));

document.getElementById("key").value="";
document.getElementById("value").value="";

alert("Öğrenildi 👍");
}

// 📩 CHAT BASTA EKLE
function add(text,type){
let box=document.getElementById("box");

let div=document.createElement("div");
div.className="msg "+type;
div.innerText=text;

box.appendChild(div);
box.scrollTop=box.scrollHeight;
}

// ENTER
document.getElementById("text").addEventListener("keydown",e=>{
if(e.key==="Enter") send();
});

</script>

</body>
</html>
