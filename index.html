<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>HAMYAZ AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    background: #0d0d0d;
    color: white;
    font-family: 'Segoe UI';
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

#chat-container {
    width: 100%;
    max-width: 500px;
    height: 100%;
    background: #1a1a1a;
    display: flex;
    flex-direction: column;
}

#header {
    background: linear-gradient(90deg, #ff0000, #990000);
    padding: 18px;
    text-align: center;
    font-weight: bold;
}

#chat-window {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.message {
    padding: 12px 16px;
    border-radius: 16px;
    max-width: 80%;
    animation: fade 0.3s;
}

@keyframes fade {
    from {opacity:0; transform:translateY(10px);}
    to {opacity:1;}
}

.user-message {
    background: #004d40;
    align-self: flex-end;
}

.ai-message {
    background: #333;
    color: #00ffcc;
}

.typing {
    opacity: 0.7;
    font-style: italic;
}

#input-area {
    display: flex;
    padding: 15px;
    background: #111;
}

#user-input {
    flex: 1;
    padding: 12px;
    border-radius: 25px;
    border: 2px solid red;
    background: #1e1e1e;
    color: white;
}

#send-btn {
    margin-left: 10px;
    padding: 0 20px;
    border-radius: 25px;
    border: none;
    background: red;
    color: white;
    cursor: pointer;
}

.google-btn {
    display: block;
    margin-top: 8px;
    background: #4285F4;
    padding: 8px;
    border-radius: 8px;
    text-align: center;
    color: white;
    text-decoration: none;
}
</style>
</head>

<body>

<div id="chat-container">
<div id="header">🔥 HAMYAZ AI</div>

<div id="chat-window"></div>

<div id="input-area">
<input id="user-input" placeholder="Bir şey yaz..." autocomplete="off">
<button id="send-btn" onclick="sendMessage()">GİT</button>
</div>
</div>

<script>
const yasakliKelimeler = ["küfür1","argo1"];

const girisMesajlari = [
 "Hoş geldin 😎 bugün ne saçmalıyoruz?",
 "Beyin fırtınasına hazır mısın? 🧠",
 "Yine geldin... hoşuma gidiyor 😏"
];

const zekiCevaplar = [
 { anahtar:["nasılsın","naber"], cevap:["İyiyim 😎","CPU yanıyor ama yaşıyorum 🔥"] },
 { anahtar:["merhaba","selam"], cevap:["Hoş geldin kral 👑","Selam 😄"] }
];

let isTyping = false;

// giriş mesajı
window.onload = () => {
    const msg = girisMesajlari[Math.floor(Math.random()*girisMesajlari.length)];
    addMessage(msg,"ai-message");
};

function sendMessage(){
    if(isTyping) return;

    const input = document.getElementById("user-input");
    const msg = input.value.trim();
    if(!msg) return;

    isTyping = true;

    addMessage(msg,"user-message");
    input.value="";

    fakeTyping(()=>{
        const msgLower = msg.toLowerCase();
        let reply="";
        let searchMode=false;

        // komut sistemi
        if(msgLower.includes("şaka")){
            reply="Adamın biri gülmüş, bahçeye dikmişler 😄";
        }
        else if(msgLower.includes("motivasyon")){
            reply="Bugün zor olabilir ama sen daha zorsun 💪";
        }
        else if(msgLower.includes("laf sok")){
            reply="Ben yapay zekayım ama senin bazı hareketler doğal değil 😏";
        }

        else if(yasakliKelimeler.some(k=>msgLower.includes(k))){
            reply="Ooo sakin ol 😅";
        }

        else{
            let bulundu = zekiCevaplar.find(item =>
                item.anahtar.some(k=>msgLower.includes(k))
            );

            if(bulundu){
                reply = bulundu.cevap[Math.floor(Math.random()*bulundu.cevap.length)];
            }else{
                reply="Bunu anlamadım 🤔 Google'a bakalım mı?";
                searchMode=true;
            }
        }

        addMessage(reply,"ai-message",searchMode,msg);
        isTyping=false;
    });
}

function fakeTyping(callback){
    addMessage("Yazıyor...","ai-message typing");
    setTimeout(()=>{
        document.querySelector(".typing")?.remove();
        callback();
    },800+Math.random()*700);
}

function addMessage(text,className,showGoogle=false,query=""){
    const win=document.getElementById("chat-window");
    const div=document.createElement("div");
    div.className="message "+className;
    div.innerHTML=text;

    if(showGoogle){
        const a=document.createElement("a");
        a.className="google-btn";
        a.innerText="Google'da Ara";
        a.href="https://www.google.com/search?q="+encodeURIComponent(query);
        a.target="_blank";
        div.appendChild(a);
    }

    win.appendChild(div);
    win.scrollTop=win.scrollHeight;
}

document.getElementById("user-input")
.addEventListener("keypress",e=>{
    if(e.key==="Enter") sendMessage();
});
</script>

</body>
</html>
