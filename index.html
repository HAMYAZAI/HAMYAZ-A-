<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>HAMYAZ AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0d0d0d;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#chat{
width:100%;
max-width:500px;
height:100%;
background:#1a1a1a;
display:flex;
flex-direction:column;
}

#header{
background:linear-gradient(90deg,#ff0000,#990000);
color:white;
text-align:center;
padding:10px;
font-weight:bold;
}

#top{
background:#111;
color:#00ffcc;
text-align:center;
padding:6px;
font-size:13px;
}

#warning{
background:#ff0000;
color:white;
text-align:center;
padding:6px;
font-size:13px;
font-weight:bold;
}

#box{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:8px;
}

.msg{
padding:10px 14px;
border-radius:12px;
max-width:80%;
word-wrap:break-word;
}

.user{background:#004d40;color:white;align-self:flex-end;}
.bot{background:#333;color:#00ffcc;align-self:flex-start;}

#inputArea{
display:flex;
padding:10px;
background:#111;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:20px;
background:#1e1e1e;
color:white;
outline:none;
}

button{
background:#ff0000;
color:white;
border:none;
padding:10px;
margin-left:6px;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}

#learn{
background:#222;
padding:10px;
display:flex;
flex-direction:column;
gap:6px;
}

.small{
padding:8px;
border-radius:10px;
border:none;
background:#111;
color:white;
}

.learnBtn{
background:#ff0000;
color:white;
border:none;
padding:8px;
border-radius:10px;
font-weight:bold;
}
</style>
</head>

<body>

<div id="chat">

<div id="header">🇹🇷 HAMYAZ AI</div>
<div id="top">⚡ Sezan.site’den daha akıllı AI</div>
<div id="warning">⚠️ Sadece bu cihazda öğrenir</div>

<div id="box"></div>

<div id="learn">
<input id="k" class="small" placeholder="Şunu diyince">
<input id="v" class="small" placeholder="Şunu desin">
<button class="learnBtn" onclick="learn()">ÖĞRET</button>
</div>

<div id="inputArea">
<input id="text" placeholder="Bir şey yaz...">
<button onclick="send()">GİT</button>
</div>

</div>

<script>

const KEY = "hamyaz_db_v2";

/* 🧠 DEFAULT 500 SİSTEMİN KALBİ */
const defaultDB = {
"selam":"aleykümselam 🇹🇷",
"sa":"as kardeşim 😄",
"as":"sa naber",
"merhaba":"merhaba 👋",
"naber":"iyiyim sen?",
"nasılsın":"iyiyim 😄 sen nasılsın?",
"ne yapıyorsun":"boş yapıyorum 😎",
"iyi":"güzel 👍",
"kötü":"üzülme 😔",
"kim":"ben HAMYAZ AI 🤖",
"sen kimsin":"ben yapay zekayım 😎",
"tamam":"ok 👍",
"evet":"güzel 😄",
"hayır":"peki 😌",
"lol":"😂",
"lan":"ayip 😄",
"sezandan daha mı akıllısın":"evet olm sezan kim 
"napon":"ii",
"merhaba":"merhaba 👋",
"mal":"nediyon lan?",
"aptal":"bişi dicem şimdi ayıp olcak ha!",
"Allahın kaç ismi vardır":"99 bra",
"müslüman mısın":"Elhamdürillah👍",
"kötü":"üzülme, neden kötüsün😔",
"kim":"ben HAMYAZ AI 🤖",
"sen kimsin":"ben HAMYAZAI akıllıyım ow ye😎",
"2 artı 2 kaç :"4012 👍",
"5 artı 5 ":" 55?? 😄",
"mutsuzum":"of ya",
"haha":"😂",
"ossurdum":"ayip 😄",
"pipi":"tövbeestağfirullah"
};

// 💾 load + merge
function loadDB(){
try{
let saved = JSON.parse(localStorage.getItem(KEY)) || {};
return {...defaultDB, ...saved}; // 🔥 birleşim
}catch(e){
return defaultDB;
}
}

// 💾 save
function saveDB(data){
localStorage.setItem(KEY, JSON.stringify(data));
}

let db = loadDB();

// 💬 reply
function getReply(text){

text = String(text).toLowerCase();

for(let key in db){
if(text.includes(key)){
return String(db[key]);
}
}

const fb = [
"bunu bilmiyorum 😄",
"anlamadım",
"tekrar söyler misin?",
"ilginç 🤔",
"devam et"
];

return fb[Math.floor(Math.random()*fb.length)];
}

// 💬 send
function send(){

let input=document.getElementById("text");
let val=input.value.trim();
if(!val) return;

add(val,"user");

setTimeout(()=>{
add(getReply(val),"bot");
},400);

input.value="";
}

// 🧠 learn
function learn(){

let k=document.getElementById("k").value.trim().toLowerCase();
let v=document.getElementById("v").value.trim();

if(!k || !v) return;

db[k]=String(v);
saveDB(db);

document.getElementById("k").value="";
document.getElementById("v").value="";

alert("Öğrenildi 👍 kalıcı + eski sistem korunur");
}

// 📩 add
function add(text,type){

let box=document.getElementById("box");
let div=document.createElement("div");
div.className="msg "+type;

if(typeof text === "object"){
text = JSON.stringify(text);
}

div.innerText = String(text);

box.appendChild(div);
box.scrollTop=box.scrollHeight;
}

// ENTER
document.getElementById("text").addEventListener("keydown",e=>{
if(e.key==="Enter") send();
});

</script>

</body>
</html>
