<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>HAMYAZ AI ULTIMATE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:#0d0d0d;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#chat-container{
    width:100%;
    max-width:500px;
    height:100%;
    background:#1a1a1a;
    display:flex;
    flex-direction:column;
}

#header{
    background:linear-gradient(90deg,#ff0000,#990000);
    padding:18px;
    text-align:center;
    font-weight:bold;
}

#chat-window{
    flex:1;
    padding:15px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.message{
    padding:12px 16px;
    border-radius:16px;
    max-width:80%;
    word-wrap:break-word;
}

.user-message{
    background:#004d40;
    align-self:flex-end;
}

.ai-message{
    background:#333;
    color:#00ffcc;
}

.typing{
    opacity:0.6;
    font-style:italic;
}

#input-area{
    display:flex;
    padding:15px;
    background:#111;
}

#user-input{
    flex:1;
    padding:12px;
    border-radius:25px;
    border:2px solid red;
    background:#1e1e1e;
    color:white;
}

#send-btn{
    margin-left:10px;
    padding:0 20px;
    border-radius:25px;
    border:none;
    background:red;
    color:white;
    cursor:pointer;
}

.google-btn{
    display:block;
    margin-top:8px;
    background:#4285F4;
    padding:8px;
    border-radius:8px;
    text-align:center;
    color:white;
    text-decoration:none;
    font-size:14px;
}

</style>
</head>

<body>

<div id="chat-container">
<div id="header">🇹🇷 HAMYAZ AI ULTIMATE</div>

<div id="chat-window"></div>

<div id="input-area">
<input id="user-input" placeholder="Bir şey yaz..." autocomplete="off">
<button id="send-btn" onclick="sendMessage()">GİT</button>
</div>
</div>

<script>

let isTyping = false;
let lastMessage = "";
let repeatCount = 0;

// 🧠 NORMAL CHAT
const zekiCevaplar = [
{ anahtar:["selam","merhaba","sa","slm"], cevap:[
"Selam 😎",
"Aleykümselam 🇹🇷",
"Hoş geldin 👑"
]},

{ anahtar:["nasılsın","naber"], cevap:[
"İyiyim 😄 sen?",
"CPU biraz yanıyor 🔥",
"Kediler benden iyi 😏"
]},

{ anahtar:["ne yapıyorsun"], cevap:[
"Evreni izliyorum 🌍",
"Boş yapıyorum ama kaliteli 😎"
]},

{ anahtar:["kim","sen kimsin"], cevap:[
"Ben HAMYAZ AI 🤖",
"Türk meme chatbot 🇹🇷"
]},

{ anahtar:["evet"], cevap:["Hmm 😏","Tamam 👍","Devam et"]},

{ anahtar:["hayır"], cevap:["Peki 😄","Olur 👍","Tamamdır"]}
];

// 😂 ŞAKA HAVUZU
const jokes = [
"3 adam sırayla uçaktan atlamış ✈️😂 uçak paramparça olmuş 🤣🤣",

"Adamın biri gülmüş 😄 alıp bahçeye dikmişler 🌱😂",

"Kerpeten Ali izliyom sus 🤫😂",

"Fırat sabotaj yapmış ama sistem bunu update sanmış 😏💥",

"Sistem küçük bir Fırat sabotajı yedi ama reboot attı 😂",

"Ali demiş ki 'ben geliyorum' sistem crash atmış 😭😂"
];

window.onload = () => {
addMessage("🇹🇷 Selam! Şaka mı normal mi Google mı? 😏","ai-message");
};

function sendMessage(){

if(isTyping) return;

const input=document.getElementById("user-input");
const msg=input.value.trim();
if(!msg) return;

const msgLower=msg.toLowerCase();

addMessage(msg,"user-message");
input.value="";

// 🔁 tekrar kontrol
if(msgLower === lastMessage){
repeatCount++;
}else{
repeatCount=0;
}
lastMessage = msgLower;

isTyping=true;

fakeTyping(()=>{

let reply="";
let searchMode=false;

// 🔁 SAME MESSAGE → GOOGLE
if(repeatCount >= 1){
reply="Bunu zaten söyledin 😏 Google’da aratayım mı?";
searchMode=true;
}

// 🔍 GOOGLE COMMAND
else if(msgLower.includes("google") || msgLower.includes("ara") || msgLower.includes("bak")){
reply="Tamam 😏 Google’da bakıyorum:";
searchMode=true;
}

// 😂 ŞAKA MODU
else if(msgLower.includes("şaka") || msgLower.includes("yap") || msgLower.includes("evet")){
reply = jokes[Math.floor(Math.random()*jokes.length)];
}

// 🧠 NORMAL CHAT
else{
let found = zekiCevaplar.find(item =>
item.anahtar.some(k=>msgLower.includes(k))
);

if(found){
reply = found.cevap[Math.floor(Math.random()*found.cevap.length)];
}else{

const fallback = [
"Kediler uzayda WiFi arıyor 🚀🐱",
"CPU düşündü ama çöktü 😄",
"Fırat sabotaj modu arka planda aktif 😏",
"Bunu anlamadım ama komik geldi 😂"
];

reply = fallback[Math.floor(Math.random()*fallback.length)];
}
}

addMessage(reply,"ai-message",searchMode,msg);

isTyping=false;
});
}

function fakeTyping(cb){
addMessage("Yazıyor...","ai-message typing");

setTimeout(()=>{
const t=document.querySelector(".typing");
if(t) t.remove();
cb();
},600+Math.random()*600);
}

function addMessage(text,className,showGoogle=false,query=""){
const win=document.getElementById("chat-window");

const div=document.createElement("div");
div.className="message "+className;
div.innerHTML=text;

if(showGoogle){
const a=document.createElement("a");
a.className="google-btn";
a.textContent="🔍 Google'da Ara";
a.href="https://www.google.com/search?q="+encodeURIComponent(query);
a.target="_blank";
div.appendChild(a);
}

win.appendChild(div);
win.scrollTop=win.scrollHeight;
}

document.getElementById("user-input")
.addEventListener("keypress",e=>{
if(e.key==="Enter") sendMessage();
});

</script>

</body>
</html>
