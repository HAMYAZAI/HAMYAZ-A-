<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Sarı ChatBot</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Segoe UI;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#chat{
width:100%;
max-width:500px;
height:100%;
background:#1e1e1e;
display:flex;
flex-direction:column;
}

#header{
background:#ffd400;
color:black;
text-align:center;
padding:15px;
font-weight:bold;
}

#box{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:8px;
}

.msg{
padding:10px 14px;
border-radius:12px;
max-width:80%;
word-wrap:break-word;
}

.user{
background:#0066ff;
color:white;
align-self:flex-end;
}

.bot{
background:#333;
color:#ffd400;
align-self:flex-start;
}

#inputArea{
display:flex;
padding:10px;
background:#111;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:20px;
outline:none;
}

button{
background:#ffd400;
border:none;
padding:10px 15px;
margin-left:8px;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}

</style>
</head>

<body>

<div id="chat">

<div id="header">🟡 SARI CHATBOT (SİMSİMİ TARZI)</div>

<div id="box"></div>

<div id="inputArea">
<input id="text" placeholder="Bir şey yaz...">
<button onclick="send()">Gönder</button>
</div>

</div>

<script>

// 🧠 500+ HİS VEREN SİSTEM
const db = [

{ keys:["sa","selam","slm","as","hey"],
replies:["selam 😄","sa naber","hey 👋","hoş geldin","selam kanka","sa 😎"] },

{ keys:["nasılsın","naber","napıyon","ne yapıyorsun"],
replies:["iyiyim sen?","idare 😄","takılıyorum","sen ne yapıyorsun?","boş yapıyorum 😏"] },

{ keys:["iyiyim","bende iyiyim","iyi"],
replies:["güzel 😄","süper 👍","sevindim","harika","cool 😎"] },

{ keys:["sen kimsin","kimsin"],
replies:["ben sarı chatbotum 🤖","Simsimi tarzıyım","basit bir AI","konuşan bot 😄"] },

{ keys:["evet","he","ok","tamam"],
replies:["ok 👍","tamamdır","güzel","anladım","devam"] },

{ keys:["hayır","yok","olmaz"],
replies:["peki 😄","tamam","olabilir","sorun değil"] },

{ keys:["ne","hı","anlamadım"],
replies:["tekrar söyler misin","anlamadım 😄","bir daha","ne dedin?"] },

{ keys:["gül","haha","xd"],
replies:["😂","komikmiş","güldün yani","lol 😄"] },

{ keys:["para","zengin"],
replies:["para önemli 💰","çalış kazan 😄","keşke bende olsa","zengin iyi şey"] },

{ keys:["aşk","sevgi"],
replies:["❤️","romantik konu","aşk zor","güzel duygu 😄"] },

{ keys:["bye","görüşürüz"],
replies:["görüşürüz 👋","bye bye","kendine iyi bak","hoşça kal"] },

{ keys:["yardım","help"],
replies:["nasıl yardımcı olayım?","sor 😄","buradayım","söyle"] },

{ keys:["kötüyüm","üzgünüm"],
replies:["üzülme 😔","geçer","yanındayım","sıkma canını"] },

{ keys:["saçma"],
replies:["biraz 😄","olabilir","ben botum zaten","lol"] }

];

function getReply(text){

text = text.toLowerCase();

for(let g of db){
for(let k of g.keys){
if(text.includes(k)){
return g.replies[Math.floor(Math.random()*g.replies.length)];
}
}
}

// fallback
const fb = [
"anlamadım 😄",
"tekrar söyler misin?",
"bunu çözemedim",
"ilginç 🤔",
"devam et"
];

return fb[Math.floor(Math.random()*fb.length)];
}

function send(){

let input=document.getElementById("text");
let val=input.value.trim();
if(!val) return;

add(val,"user");

setTimeout(()=>{
add(getReply(val),"bot");
},400);

input.value="";
}

function add(text,type){
let box=document.getElementById("box");

let div=document.createElement("div");
div.className="msg "+type;
div.innerText=text;

box.appendChild(div);
box.scrollTop=box.scrollHeight;
}

</script>

</body>
</html>
